name: Custom_SMP_Plugin
version: '1.0-SNAPSHOT'
main: io.sniperjohnny.github.custom_SMP_Plugin.Custom_SMP_Plugin
api-version: '1.21'


commands:
  fly:
    permission: "smpplugin.fly"
    description: "lets you fly"
    aliases:
      - flying
      - f
  smite:
    permission: "smpplugin.smite"
    description: "lets you choose who gets hit by lightning"
    aliases:
      - sm
      - electrocute
  revive:
    permission: "smpplugin.revive"
    description: "lets you choose who gets hit by lightning"
    aliases:
      - res
      - resurrect
  unban:
    permission: "smpplugin.unban"
    description: "lets you unban an Player"
